name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CHANGELOG.md'

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck

  build:
    name: Build all targets
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run manifest
      - name: Build all targets
        run: |
          for entry in \
            "bun-darwin-arm64 dev-darwin-arm64" \
            "bun-darwin-x64 dev-darwin-x86_64" \
            "bun-linux-x64 dev-linux-x86_64" \
            "bun-linux-arm64 dev-linux-arm64"; do
            target=$(echo $entry | cut -d' ' -f1)
            filename=$(echo $entry | cut -d' ' -f2)
            bun build src/main.ts --compile --target=$target --outfile dist/$filename
            zip -j dist/$filename.zip dist/$filename
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*.zip

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist
      - name: Create checksums
        working-directory: dist
        run: shasum -a 256 *.zip > CHECKSUMS
      - name: Tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          make_latest: false
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/*.zip
            dist/CHECKSUMS

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
