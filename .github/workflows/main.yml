name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CHANGELOG.md'

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck

  build:
    name: Build (${{ matrix.target }})
    needs: typecheck
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            filename: dev-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            filename: dev-darwin-x86_64
          - os: ubuntu-latest
            target: bun-linux-x64
            filename: dev-linux-x86_64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            filename: dev-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build
        run: bun run manifest && bun build src/main.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.filename }}
      - name: Zip
        run: zip -j dist/${{ matrix.filename }}.zip dist/${{ matrix.filename }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.filename }}
          path: dist/${{ matrix.filename }}.zip

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: shasum -a 256 *.zip > CHECKSUMS
      - name: Tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          make_latest: false
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/*.zip
            dist/CHECKSUMS

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
