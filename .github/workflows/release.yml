name: "Release: Build and Upload Binaries"

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: release-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run manifest
      - name: Build all targets
        run: |
          for entry in \
            "bun-darwin-arm64 dev-darwin-arm64" \
            "bun-darwin-x64 dev-darwin-x86_64" \
            "bun-linux-x64 dev-linux-x86_64" \
            "bun-linux-arm64 dev-linux-arm64"; do
            target=$(echo $entry | cut -d' ' -f1)
            filename=$(echo $entry | cut -d' ' -f2)
            bun build src/main.ts --compile --target=$target --outfile dist/$filename
            zip -j dist/$filename.zip dist/$filename
            shasum -a 256 dist/$filename.zip > dist/$filename.sha256
          done
      - name: Checksums
        working-directory: dist
        run: shasum -a 256 *.zip > CHECKSUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
            dist/CHECKSUMS
