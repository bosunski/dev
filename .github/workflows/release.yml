name: "Release: Build and Upload Binaries"

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: release-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ github.ref_name }} (${{ matrix.filename }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            filename: dev-darwin-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            filename: dev-linux-x86_64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            filename: dev-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build
        run: bun run manifest && bun build src/main.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.filename }}
      - name: Zip
        run: zip -j dist/${{ matrix.filename }}.zip dist/${{ matrix.filename }}
      - name: Checksum
        working-directory: dist
        run: shasum -a 256 ${{ matrix.filename }}.zip > ${{ matrix.filename }}.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.filename }}.zip
            dist/${{ matrix.filename }}.sha256
